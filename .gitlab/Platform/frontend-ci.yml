platform-frontend-build:
  stage: build
  image: node:20-alpine
  cache:
    key:
      files:
        - Platform/frontend/package-lock.json
    paths:
      - Platform/frontend/node_modules/
  script:
    - cd Platform/frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - Platform/frontend/dist/
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - Platform/frontend/**/*
        - .gitlab-ci.yml
        - .gitlab/**/*
      when: always
    - if: $CI_COMMIT_BRANCH == "develop"
      changes:
        - Platform/frontend/**/*
        - .gitlab-ci.yml
        - .gitlab/**/*
      when: always
    - when: never
