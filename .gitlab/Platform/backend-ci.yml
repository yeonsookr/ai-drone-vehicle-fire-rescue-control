platform-backend-test:
  stage: test
  image: gradle:8-jdk21
  script:
    - cd Platform/backend
    - ./gradlew test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - Platform/backend/**/*
        - .gitlab-ci.yml
        - .gitlab/**/*
      when: always
    - if: $CI_COMMIT_BRANCH == "develop"
      changes:
        - Platform/backend/**/*
        - .gitlab-ci.yml
        - .gitlab/**/*
      when: always
    - when: never

platform-backend-build:
  stage: build
  image: gradle:8-jdk21
  script:
    - cd Platform/backend
    - ./gradlew build -x test
  artifacts:
    paths:
      - Platform/backend/build/libs/app.jar
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - Platform/backend/**/*
        - .gitlab-ci.yml
        - .gitlab/**/*
      when: always
    - if: $CI_COMMIT_BRANCH == "develop"
      changes:
        - Platform/backend/**/*
        - .gitlab-ci.yml
        - .gitlab/**/*
      when: always
    - when: never
