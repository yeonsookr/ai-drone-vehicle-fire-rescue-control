version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: drone-mysql
    ports: ["3306:3306"]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: drone_control
      TZ: Asia/Seoul
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: drone-mqtt
    ports: ["1883:1883", "9001:9001"]
    command: mosquitto -c /mosquitto-no-auth.conf